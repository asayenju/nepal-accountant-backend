spring.application.name=nepal-accountant-backend
server.port=${PORT:8080}

app.supabase.url=${SUPABASE_URL:https://your-project.supabase.co}
app.supabase.anon-key=${SUPABASE_ANON_KEY:replace-me}
app.supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY:replace-me}
app.supabase.invoice-bucket=${SUPABASE_INVOICE_BUCKET:invoice-images}

app.ai.provider=${AI_PROVIDER:openai}
app.ai.model=${AI_MODEL:gpt-4.1-mini}
app.ai.api-key=${AI_API_KEY:replace-me}
app.ai.base-url=${AI_BASE_URL:https://api.openai.com/v1}

management.endpoints.web.exposure.include=health,info
